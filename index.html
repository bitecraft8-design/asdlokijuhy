body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:46px 46px;
    opacity:.55;
}
.app-container{
    width:100%;
    max-width:520px;
    margin:auto;
    min-height:100vh;
    padding:22px 18px 110px;
    position:relative;
}
.screen{display:none;animation:fadeIn .42s ease}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(14px);filter:blur(4px)}
    to{opacity:1;transform:translateY(0);filter:blur(0)}
}
h1,h2,h3{font-family:'Playfair Display',serif;font-style:italic}
.logo-box{text-align:center;margin-top:82px;margin-bottom:36px}
.logo-line{width:92px;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);margin:0 auto 18px}
.brand{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:34px;
    letter-spacing:2px;
    color:var(--gold2);
    text-shadow:0 8px 25px rgba(0,0,0,.7);
}
.brand-sub{
    margin-top:8px;
    font-size:11px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--muted);
}
.main-title{
    text-align:center;
    margin-top:35px;
    font-size:46px;
    letter-spacing:1px;
    color:var(--gold2);
    text-shadow:0 15px 30px rgba(0,0,0,.55);
}
.subtitle{
    text-align:center;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:5px;
    color:var(--muted);
    margin:8px 0 36px;
}
.menu-btn{
    width:100%;
    padding:20px 20px;
    margin-bottom:15px;
    background:linear-gradient(145deg,rgba(255,255,255,.105),rgba(255,255,255,.035));
    border:1px solid var(--line);
    border-radius:22px;
    color:var(--text);
    font-family:'Montserrat',sans-serif;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.28s ease;
    box-shadow:0 16px 34px rgba(0,0,0,.28);
    backdrop-filter:blur(12px);
}
.menu-btn:hover{transform:translateY(-2px);border-color:rgba(241,210,138,.75);background:linear-gradient(145deg,rgba(197,160,89,.18),rgba(255,255,255,.04))}

.menu-btn.fasting-category{
    border-color:rgba(61,220,132,.95);
    background:linear-gradient(145deg,rgba(61,220,132,.18),rgba(255,255,255,.045));
    box-shadow:0 16px 34px rgba(61,220,132,.16);
}
.menu-btn.fasting-category b,
.menu-btn.fasting-category .icon{
    color:#3ddc84;
}
.menu-btn.fasting-category .icon{
    background:rgba(61,220,132,.14);
    border-color:rgba(61,220,132,.45);
}
.menu-btn.fasting-category span{
    color:#bff5d6;
}
.menu-btn:active{transform:scale(.97)}
.menu-btn .label{display:flex;flex-direction:column;text-align:left}
.menu-btn .label b{font-size:17px;letter-spacing:.7px;margin-bottom:5px}
.menu-btn .label span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.7px}
.lang-btn{
    justify-content:center;
    padding:21px 22px;
    text-align:center;
}
.lang-btn .label{
    width:100%;
    align-items:center;
    text-align:center;
}
.lang-btn .label b{
    font-family:'Playfair Display',serif;
    font-style:italic;
    font-size:25px;
    font-weight:700;
    letter-spacing:1.4px;
    color:var(--gold2);
    margin:0;
    text-shadow:0 8px 22px rgba(0,0,0,.55);
}
.lang-btn .icon{
    display:none;
}
.icon{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(197,160,89,.14);
    color:var(--gold2);
    font-size:18px;
    border:1px solid rgba(197,160,89,.25);
}

.category-code,
.item-code,
.item-inline-code{
    flex-shrink:0;
    min-width:38px;
    height:38px;
    border-radius:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,rgba(241,210,138,.22),rgba(197,160,89,.10));
    border:1px solid rgba(241,210,138,.35);
    color:var(--gold2);
    font-weight:800;
    font-size:13px;
    letter-spacing:.5px;
    box-shadow:0 10px 22px rgba(0,0,0,.20);
}
.menu-btn .label{flex:1}
.menu-btn.fasting-category .category-code{
    color:#3ddc84;

        afterNote:{
            sr:"*Balans između snage i elegancije*\nKremasti rižoto od arborio pirinča sa sočnim komadima ramsteka, sušenim paradajzom i svežim spanaćem.\nZaokružen parmezanom koji daje punoću ukusa.\nBalans između snage i elegancije.\nIdealan izbor za one koji traže bogat i kvalitetan obrok.\n\nRižoto „Olympia” nosi naziv naših dugogodišnjih prijatelja iz Olympia fitness gym-a koji su već više od decenije deo naše priče.\nKao znak zahvalnosti za poverenje i lojalnost, kreirali smo jelo koje spaja snagu, balans i vrhunski ukus - baš kao i njihov pristup treningu.",
            en:"*A balance between strength and elegance*\nCreamy arborio rice risotto with juicy pieces of rump steak, sun-dried tomato and fresh spinach.\nRounded off with Parmesan for a full, rich flavour.\nA balance between strength and elegance.\nAn ideal choice for those looking for a rich, high-quality meal.\n\nRisotto “Olympia” is named after our long-time friends from Olympia Fitness Gym, who have been part of our story for more than a decade.\nAs a sign of gratitude for their trust and loyalty, we created a dish that combines strength, balance and premium taste - just like their approach to training.",
            ru:"*Баланс силы и элегантности*\nКремовое ризотто из риса арборио с сочными кусочками рамстека, вялеными помидорами и свежим шпинатом.\nЗавершено пармезаном, который придаёт вкусу полноту.\nБаланс силы и элегантности.\nИдеальный выбор для тех, кто ищет насыщенное и качественное блюдо.\n\nРизотто «Olympia» названо в честь наших давних друзей из Olympia Fitness Gym, которые уже более десяти лет являются частью нашей истории.\nВ знак благодарности за доверие и лояльность мы создали блюдо, соединяющее силу, баланс и превосходный вкус - как и их подход к тренировкам.",
            tr:"*Güç ve zarafet arasında denge*\nSulu bonfile parçaları, kurutulmuş domates ve taze ıspanakla hazırlanan kremamsı arborio pirinci risottosu.\nLezzete dolgunluk katan parmesanla tamamlanır.\nGüç ve zarafet arasında denge.\nZengin ve kaliteli bir öğün arayanlar için ideal seçim.\n\nRisotto “Olympia”, on yıldan uzun süredir hikâyemizin parçası olan Olympia Fitness Gym’deki uzun yıllardır dostlarımızın adını taşır.\nGüvenleri ve sadakatleri için teşekkür olarak; güç, denge ve üst düzey lezzeti birleştiren bir yemek yarattık - tıpkı onların antrenman yaklaşımı gibi.",
            zh:"*力量与优雅之间的平衡*\n奶香浓郁的Arborio烩饭，搭配多汁牛排块、风干番茄和新鲜菠菜。\n以帕尔马干酪收尾，使味道更加饱满。\n力量与优雅之间的平衡。\n适合追求丰盛、高品质餐食的客人。\n\n“奥林匹亚”烩饭以我们多年的朋友 Olympia Fitness Gym 命名，他们十多年来一直是我们故事的一部分。\n为了感谢他们的信任与忠诚，我们创作了这道融合力量、平衡与高级风味的菜品——正如他们对训练的态度一样。"
        },

            en:"Your Tramonto team",

            tr:"Tramonto ekibiniz",

        }

const possibleFastingNote = {
    sr:"Napomena: ovo jelo može biti posno samo ako naglasite konobaru da ga pripremi posno.",
    en:"Note: this dish can be made fasting-style only if you tell the waiter to prepare it that way.",

    tr:"Not: Bu yemek sadece garsona oruç/vegan usulü hazırlanmasını özellikle söylerseniz bu şekilde yapılabilir.",
    zh:"注意：这道菜只有在您告知服务员需要斋戒/素食做法时，才可以按此方式制作。"
};

function appendPossibleFastingNote(desc){
    const out={};
    Object.keys(content).forEach(l=>{
        const base=(desc && (desc[l] || desc.en || desc.sr)) || "";
        const note=possibleFastingNote[l] || possibleFastingNote.en;
        out[l]=base.includes(note) ? base : (base ? base + " " + note : note);
    });
    return out;
}

function findMenuItemsBySr(names){
    const found=[];
    const wanted=new Set(names.map(n=>n.toLowerCase()));
    Object.keys(fullMenu).forEach(catKey=>{
        if(catKey === "posno") return;
        const cat=fullMenu[catKey];
        (cat.items || []).forEach(item=>{
            const sr=item.name && item.name.sr ? item.name.sr.toLowerCase() : "";
            if(wanted.has(sr)) found.push(item);
        });
        (cat.sections || []).forEach(sec=>{
            (sec.items || []).forEach(item=>{
                const sr=item.name && item.name.sr ? item.name.sr.toLowerCase() : "";
                if(wanted.has(sr)) found.push(item);
            });
        });
    });
    return found;
}

function addUniqueToFastingCategory(item){
    if(!fullMenu.posno || !fullMenu.posno.items) return;
    const sr=item.name && item.name.sr ? item.name.sr : "";
    const exists=fullMenu.posno.items.some(x=>x.name && x.name.sr === sr);
    if(!exists) fullMenu.posno.items.push({...item, desc:{...(item.desc || {})}});
}

findMenuItemsBySr(["Tuna pasta salata","Arabiatta","Fungi","Tramonto pizza","Tramonto Nero","Mediterana"]).forEach(item=>{
    item.possibleFasting=true;
    item.desc=appendPossibleFastingNote(item.desc);
    addUniqueToFastingCategory(item);
});

findMenuItemsBySr(["Posna pizza"]).forEach(item=>{
    item.fasting=true;
    item.possibleFasting=false;
    addUniqueToFastingCategory(item);
});

function getText(obj){
    if(!obj) return "";
    if(Object.prototype.hasOwnProperty.call(obj, lang)) return obj[lang];
    return obj.en || obj.sr || "";
}

function getCategoryKeys(){
    return Object.keys(fullMenu);
}
function getCategoryNumber(catKey){
    const index=getCategoryKeys().indexOf(catKey);
    return index >= 0 ? index + 1 : "";
}
function getItemCode(catKey, item, fallbackIndex){
    const cat=fullMenu[catKey];
    const catNumber=getCategoryNumber(catKey);
    if(!cat || !catNumber) return "";
    let itemNumber=0;

    if(cat.layout === "compact" && cat.sections){
        for(const sec of cat.sections){
            for(const secItem of (sec.items || [])){
                itemNumber++;
                if(secItem === item) return catNumber + "." + itemNumber;
            }
        }
    }

    if(typeof fallbackIndex === "number") itemNumber=fallbackIndex + 1;
    else if(cat.items) itemNumber=cat.items.indexOf(item) + 1;

    return itemNumber > 0 ? catNumber + "." + itemNumber : "";
}
function hideAll(){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    window.scrollTo(0,0);
}

function showOnly(screenId){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    const el=document.getElementById(screenId);
    if(el) el.style.display="block";
    window.scrollTo(0,0);
}

function makeAppState(screen, catKey){
    return {app:true, screen:screen, lang:lang, catKey:catKey || currentCategory || null};
}

function pushAppState(screen, catKey){
    const state=makeAppState(screen, catKey);
    history.pushState(state, "", "#" + screen);
    renderAppState(state);
}

function appBack(){
    history.back();
}

function renderAppState(state){
    if(!state || !state.app) state={app:true, screen:"lang", lang:lang, catKey:null};

    const modal=document.getElementById("item-modal");
    if(modal) modal.style.display="none";

    if(state.lang && content[state.lang]){
        lang=state.lang;
        document.documentElement.lang=lang;
    }

    if(state.screen==="lang"){
        showOnly("screen-lang");
        return;
    }

    if(state.screen==="home"){
        showOnly("screen-home");
        return;
    }

    if(state.screen==="categories"){
        document.getElementById("cat-title").innerText=content[lang].catTitle;
        document.getElementById("cat-search").value="";
        renderCategories();
        showOnly("screen-categories");
        return;
    }

    if(state.screen==="items"){
        currentCategory=state.catKey || currentCategory;
        if(currentCategory && fullMenu[currentCategory]){
            const itemTitleEl=document.getElementById("item-cat-title");
            const categoryNumber=getCategoryNumber(currentCategory);
            itemTitleEl.innerText=(categoryNumber ? categoryNumber + ". " : "") + getText(fullMenu[currentCategory].title);
            itemTitleEl.style.color = currentCategory === "posno" ? "#3ddc84" : "var(--gold2)";
            const categoryNote=document.getElementById("category-time-note");
            if(fullMenu[currentCategory].note){
                categoryNote.innerText=getText(fullMenu[currentCategory].note);
                categoryNote.style.display="block";
            }else{
                categoryNote.innerText="";
                categoryNote.style.display="none";
            }
            document.getElementById("item-search").value="";
            renderItems();
            showOnly("screen-items");
        }else{
            document.getElementById("cat-title").innerText=content[lang].catTitle;
            renderCategories();
            showOnly("screen-categories");
        }
        return;
    }

    if(state.screen==="modal"){
        showOnly("screen-items");
        return;
    }

    showOnly("screen-lang");
}
function showLangScreen(){
    pushAppState("lang", null);
}
function setLang(l){
    lang=l;
    document.documentElement.lang=l;
    document.getElementById("home-welcome").innerText=content[lang].welcome;
    document.getElementById("home-sub").innerText=content[lang].sub;
    document.getElementById("lbl-menu").innerText=content[lang].menu;
    document.getElementById("sub-menu").innerText=content[lang].menuSub;
    document.getElementById("lbl-res").innerText=content[lang].res;
    document.getElementById("sub-res").innerText=content[lang].resSub;
    document.getElementById("lbl-review").innerText=content[lang].rev;
    document.getElementById("sub-review").innerText=content[lang].revSub;
    document.getElementById("back-lang").innerText=content[lang].back;
    document.getElementById("back-cat").innerText=content[lang].back;
    document.getElementById("back-items").innerText=content[lang].backToMenu;
    document.getElementById("cat-search").placeholder=content[lang].search;
    document.getElementById("item-search").placeholder=content[lang].search;
    document.getElementById("tap-note").innerText=content[lang].tap;
    document.getElementById("modal-close").innerText=content[lang].close;
    document.getElementById("footer-premium").innerText=content[lang].footerPremium;
    document.getElementById("footer-info-text").innerText=content[lang].footerInfo;
    pushAppState("home", null);
}
function goHome(){
    pushAppState("home", null);
}
function showMenu(){
    pushAppState("categories", null);
}
function renderCategories(){
    const q=document.getElementById("cat-search").value.toLowerCase().trim();
    const list=document.getElementById("categories-list");
    list.innerHTML="";
    Object.keys(fullMenu).forEach(key=>{
        const title=getText(fullMenu[key].title);
        if(q && !title.toLowerCase().includes(q)) return;
        const btn=document.createElement("button");
        btn.className="menu-btn" + (key === "posno" ? " fasting-category" : "");
        btn.onclick=()=>showItems(key);
        const note=fullMenu[key].note ? getText(fullMenu[key].note) : content[lang].view;
        const catNumber=getCategoryNumber(key);
        btn.innerHTML=`<div class="category-code">${catNumber}</div><div class="label"><b>${title}</b><span>${note}</span></div><div class="icon">→</div>`;
        list.appendChild(btn);
    });
}
function showItems(catKey){
    currentCategory=catKey;
    pushAppState("items", catKey);
}
function priceText(price){
    if(String(price).includes("/")) return price + " RSD";
    return price + " RSD";
}
function renderItems(){
    const cat=fullMenu[currentCategory];
    const q=document.getElementById("item-search").value.toLowerCase().trim();
    const list=document.getElementById("items-list");
    list.innerHTML="";
    if(cat.layout === "compact"){
        cat.sections.forEach(sec=>{
            const rows=(sec.items || []).filter(it=>{
                const n=getText(it.name);
                const d=it.desc ? getText(it.desc) : "";
                const s=(n+" "+d+" "+it.price).toLowerCase();
                return !q || s.includes(q);
            });
            if(!rows.length) return;
            const wrap=document.createElement("div");
            wrap.className="drink-section";
            const title=document.createElement("div");
            title.className="drink-section-title";
            title.innerText=getText(sec.title);
            const box=document.createElement("div");
            box.className="drink-list";
            rows.forEach(it=>{
                const n=getText(it.name);
                const d=it.desc ? getText(it.desc) : "";
                const code=getItemCode(currentCategory, it);
                const row=document.createElement("div");
                row.className="drink-row";
                row.innerHTML=`<div><div class="drink-name"><span class="item-inline-code">${code}</span>${n}</div>${d ? `<div class="drink-desc">${d}</div>` : ""}</div><div class="drink-price">${it.price} RSD</div>`;
                box.appendChild(row);
            });
            wrap.appendChild(title);
            wrap.appendChild(box);
            list.appendChild(wrap);
        });
        return;
    }
    cat.items.forEach((it,idx)=>{
        const n=getText(it.name);
        const d=it.desc ? getText(it.desc) : "";
        const code=getItemCode(currentCategory, it, idx);
        const search=(n+" "+d+" "+it.price).toLowerCase();
        if(q && !search.includes(q)) return;
        const card=document.createElement("div");
        card.className="food-item" + (it.fasting ? " fasting-item" : (it.possibleFasting ? " possible-fasting-item" : ((it.special && lang !== "sr") ? " special-item" : "")));
        card.onclick=()=>openItem(it);
        card.innerHTML=`
            <div class="item-code">${code}</div>
            <div class="food-img">${it.img ? `<img src="${it.img}" alt="${n}">` : ""}</div>
            <div class="food-info">
                <h4>${n}${it.fasting ? ` <span class="fasting-badge">${content[lang].fasting}</span>` : (it.possibleFasting ? ` <span class="possible-fasting-badge">${content[lang].possibleFasting}</span>` : "")}</h4>
                ${d ? `<p>${d}</p>` : ""}
            </div>
            <div class="food-price">${it.price}<small>RSD</small></div>
        `;
        list.appendChild(card);
    });
    if(!q && cat.afterNote){
        const footer=document.createElement("div");
        footer.className="category-footer-note";
        footer.innerHTML=`<div>${getText(cat.afterNote)}</div>${cat.signature ? `<div class="footer-signature">${getText(cat.signature)}</div>` : ""}`;
        list.appendChild(footer);
    }
}
function openItem(it){
    const n=getText(it.name);
    const d=it.desc ? getText(it.desc) : "";
    const code=getItemCode(currentCategory, it);
    const descBox=document.getElementById("modal-desc");
    document.getElementById("modal-title").innerText=(code ? code + "  " : "") + n;
    descBox.innerText=d;
    descBox.style.display=d ? "block" : "none";
    document.getElementById("modal-price").innerText=priceText(it.price);
    document.getElementById("modal-img").innerHTML=it.img ? `<img src="${it.img}" alt="${n}">` : "";
    document.getElementById("item-modal").style.display="flex";
    history.pushState({app:true, screen:"modal", lang:lang, catKey:currentCategory}, "", "#modal");
}
function hideModal(){
    const modal=document.getElementById("item-modal");
    if(modal && modal.style.display==="flex" && history.state && history.state.app && history.state.screen==="modal"){
        history.back();
    }else if(modal){
        modal.style.display="none";
    }
}
function closeModal(e){if(e.target.id==="item-modal") hideModal();}
